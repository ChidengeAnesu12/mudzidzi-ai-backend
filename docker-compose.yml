services:
  postgres:
    image: postgres:16-alpine
    container_name: mudzidzi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mudzidzi
      POSTGRES_PASSWORD: mudzidzi_dev_password
      POSTGRES_DB: mudzidzi_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mudzidzi -d mudzidzi_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mudzidzi_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: